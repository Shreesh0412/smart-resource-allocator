<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Saarthi</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <div class="auth-bg"></div>

  <div class="auth-page">
    <div style="width:100%;max-width:480px;position:relative;z-index:2;">
      
      <a href="/index.html" style="color:var(--text-muted);font-size:0.85rem;display:flex;align-items:center;gap:6px;margin-bottom:24px;">
        ← Back to Home
      </a>

      <div class="auth-card fade-in">
        <div class="auth-logo">SAARTHI</div>
        <p class="auth-subtitle">Welcome back. Sign in to continue.</p>

        <div class="auth-toggle">
          <button type="button" class="auth-toggle-btn active" id="toggle-volunteer" onclick="setRole('volunteer')">
            🙋 Volunteer
          </button>
          <button type="button" class="auth-toggle-btn" id="toggle-ngo" onclick="setRole('ngo')">
            🏢 NGO
          </button>
        </div>

        <form onsubmit="handleLogin(event)">
          <div style="display:flex;flex-direction:column;gap:16px;">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="email" class="form-input" required>
            </div>

            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" id="password" class="form-input" required>
            </div>
          </div>

          <div id="login-error" class="form-error mt-2" style="display:none;"></div>

          <button type="submit" class="btn btn-primary btn-full mt-6" id="login-btn">
            Sign In
          </button>
        </form>

        <div class="auth-divider"><span>or</span></div>
        <a href="/signup.html" class="btn btn-secondary btn-full">Create Account</a>

        <div class="auth-footer">
          Community member? <a href="/report-problem.html">Report a problem</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/api.js"></script>

  <script>
    let currentRole = 'volunteer';

    if (Auth.isLoggedIn()) Auth.redirect();

    function setRole(role) {
      currentRole = role;
      document.getElementById('toggle-volunteer').classList.toggle('active', role === 'volunteer');
      document.getElementById('toggle-ngo').classList.toggle('active', role === 'ngo');
    }

    async function handleLogin(e) {
      e.preventDefault();

      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');

      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const data = currentRole === 'volunteer'
          ? await api.volunteerLogin(email, password)
          : await api.ngoLogin(email, password);

        // ✅ FIX: Use 'currentRole' directly instead of 'data.type'
        Auth.save({
          access_token: data.access_token,
          refresh_token: data.refresh_token,
          id: data.id,
          type: currentRole, 
          name: data.name
        });

        Auth.redirect();

      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
