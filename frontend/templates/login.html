<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Saarthi</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <div class="auth-bg"></div>

  <div class="auth-page">
    <div style="width:100%;max-width:480px;position:relative;z-index:2;">
      <!-- Back link -->
      <a href="/index.html" style="color:var(--text-muted);font-size:0.85rem;display:flex;align-items:center;gap:6px;margin-bottom:24px;">
        ← Back to Home
      </a>

      <div class="auth-card fade-in">
        <div class="auth-logo">SAARTHI</div>
        <p class="auth-subtitle" id="auth-subtitle">Welcome back. Sign in to continue.</p>

        <!-- Role Toggle -->
        <div class="auth-toggle">
          <button class="auth-toggle-btn active" id="toggle-volunteer" onclick="setRole('volunteer')">
            🙋 Volunteer
          </button>
          <button class="auth-toggle-btn" id="toggle-ngo" onclick="setRole('ngo')">
            🏢 NGO
          </button>
        </div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="handleLogin(event)">
          <div style="display:flex;flex-direction:column;gap:16px;">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
          </div>
          <div id="login-error" class="form-error mt-2" style="display:none;"></div>
          <button type="submit" class="btn btn-primary btn-full mt-6" id="login-btn">
            Sign In
          </button>
        </form>

        <div class="auth-divider"><span>or</span></div>
        <a href="/signup.html" class="btn btn-secondary btn-full">Create Account</a>

        <div class="auth-footer">
          Community member? <a href="/report-problem.html">Report a problem</a> without logging in.
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/static/js/api.js"></script>
  <script>
    let currentRole = 'volunteer';

    // Pre-select role from URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('type') === 'ngo') setRole('ngo');

    // Redirect if already logged in
    if (Auth.isLoggedIn()) Auth.redirect();

    function setRole(role) {
      currentRole = role;
      document.getElementById('toggle-volunteer').classList.toggle('active', role === 'volunteer');
      document.getElementById('toggle-ngo').classList.toggle('active', role === 'ngo');
      document.getElementById('auth-subtitle').textContent =
        role === 'volunteer' ? 'Welcome back, volunteer. Sign in to continue.' : 'NGO portal — sign in to manage tasks.';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn   = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.style.display = 'none';

      try {
        let data;
        if (currentRole === 'volunteer') {
          data = await api.volunteerLogin(email, password);
          Auth.save({ ...data, type: 'volunteer', name: data.name });
          showToast(`Welcome back, ${data.name}!`, 'success');
          setTimeout(() => window.location.href = '/volunteer-dashboard.html', 800);
        } else {
          data = await api.ngoLogin(email, password);
          Auth.save({ ...data, type: 'ngo', name: data.name });
          showToast(`Welcome back, ${data.name}!`, 'success');
          setTimeout(() => window.location.href = '/ngo-dashboard.html', 800);
        }
      } catch(err) {
        errEl.textContent = err.message || 'Login failed. Check your credentials.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
