<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Map — Saarthi</title>

  <link rel="stylesheet" href="/static/css/main.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <!-- Marker Cluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <!-- Heatmap -->
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <style>
    body { overflow: hidden; }

    #map {
      position: fixed;
      top: var(--nav-h);
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
    }

    #map-panel {
      position: fixed;
      top: calc(var(--nav-h) + 16px);
      left: 16px;
      z-index: 9999;
      width: 260px;
      background: rgba(10,15,30,0.9);
      backdrop-filter: blur(18px);
      border-radius: 16px;
      padding: 14px;
    }

    .map-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #1a1f35;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .map-btn:hover {
      background: #ff5722;
    }

    .map-btn.active {
      background: #ff5722;
    }

    #map-legend {
      position: fixed;
      top: calc(var(--nav-h) + 16px);
      right: 16px;
      z-index: 9999;
      background: rgba(10,15,30,0.9);
      padding: 12px;
      border-radius: 10px;
    }

    #map-stats {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
    }

    .map-stat {
      background: rgba(10,15,30,0.95);
      padding: 10px;
      border-radius: 10px;
    }

    .leaflet-container {
      z-index: 1 !important;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container">
      <a href="/index.html" class="nav-brand">SAARTHI</a>
    </div>
  </nav>

  <!-- MAP -->
  <div id="map"></div>

  <!-- CONTROL PANEL -->
  <div id="map-panel">

    <button id="taskBtn" class="map-btn active" onclick="toggleTasks()">📍 Tasks</button>
    <button id="heatBtn" class="map-btn" onclick="toggleHeatmap()">🔥 Heatmap</button>

    <div style="margin-top:10px;">
      <select id="filter-urgency" class="map-btn">
        <option value="">All Urgency</option>
        <option value="urgent">🔴 Urgent</option>
        <option value="med">🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>

      <select id="filter-type" class="map-btn">
        <option value="">All Types</option>
        <option value="education">Education</option>
        <option value="health">Health</option>
        <option value="food">Food</option>
        <option value="rescue">Rescue</option>
      </select>
    </div>

  </div>

  <!-- LEGEND -->
  <div id="map-legend">
    🔴 Urgent <br>
    🟡 Medium <br>
    🟢 Low
  </div>

  <!-- STATS -->
  <div id="map-stats">
    <div class="map-stat">
      Tasks: <span id="count">0</span>
    </div>
  </div>

  <!-- SCRIPTS (ORDER IS IMPORTANT) -->
  <script src="/static/js/api.js"></script>
  <script src="/static/js/map.js"></script>

</body>
</html>
